<body>
    <div class="background-container">
        <div class="menu-icon" id="menuIcon" onclick="toggleMenu()">☰</div>

            <div class="point-font main-title" onclick="window.location.href='index.html'">요리의 정원</div>

            </div>

        <main class="wrapper">
            <div class="content">
                <div class="login-container">
                    <h2>로그인</h2>
                    <div style="background: #fff3cd; border: 2px solid #ffc107; border-radius: 8px; padding: 15px; margin-bottom: 20px; text-align: center;">
                        <p style="margin: 0; color: #856404; font-size: 0.9rem;">
                            ⚠️ 데모 버전: 로그인 기능은 작동하지 않습니다.
                        </p>
                    </div>
                    <form onsubmit="event.preventDefault(); alert('데모 버전에서는 로그인할 수 없습니다.');">
                        <div class="input-group">
                            <label for="username">아이디</label>
                            <input type="text" id="username" name="username" placeholder="아이디를 입력하세요">
                        </div>
                        <div class="input-group">
                            <label for="password">비밀번호</label>
                            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요">
                        </div>
                        <button type="submit" class="submit-btn">로그인</button>
                    </form>
                    <p>계정이 없으신가요? <a href="signup.html" class="signup-link">회원가입</a></p>
                </div>
            </div>
        </main>
