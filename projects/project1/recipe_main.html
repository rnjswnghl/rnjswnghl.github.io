<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>레시피 목록 - 요리의 정원</title>

    <link rel="stylesheet" href="static/css/layout.css">

    <link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="background-container">
        <div class="menu-icon" id="menuIcon" onclick="toggleMenu()">☰</div>
        <header>
            <div class="point-font main-title" onclick="window.location.href='index.html'">요리의 정원</div>
        </header>

        <div id="menu" class="menu">
            <a href="javascript:void(0)" class="closebtn" onclick="toggleMenu()">×</a>   
            <div class="profile">
                <span>Guest</span>
            </div>
            <div id="menu-logged-out" class="menu-basictag">
                <a href="index.html">홈</a>
                <a href="recipe_main.html">레시피</a>
                <a href="cooktip.html">요리 꿀팁</a>
                <a href="login.html">로그인</a>
                <a href="signup.html">회원가입</a>
            </div>
            <div id="menu-logged-in" class="menu-basictag" style="display:none">
                <a href="index.html">홈</a>
                <a href="recipe_main.html">레시피</a>
                <a href="cooktip.html">요리 꿀팁</a>
                <a href="recipe_register.html">레시피 작성</a>
                <a href="mypagemain.html">마이페이지</a>
                <a href="javascript:void(0)" onclick="logout()">로그아웃</a>
            </div>
        </div>

        <main class="wrapper">
            <div class="content">
                <header>  
                    <div class="navigation">
                        <a href="javascript:void(0)" class="nav-tab korean-font active" data-tab="all">모든 레시피</a>
                        <a href="javascript:void(0)" class="nav-tab korean-font" data-tab="trending">화제의 레시피</a>
                        <a href="javascript:void(0)" class="nav-tab korean-font" data-tab="seasonal">제철 레시피</a>
                        <a href="javascript:void(0)" class="nav-tab korean-font" data-tab="specialty">특색 레시피</a>
                        <a href="recipe_register.html" class="korean-font">레시피 등록</a>
                    </div>
                </header>

                <!-- 제철 레시피 서브탭 (제철 선택 시에만 표시) -->
                <div id="seasonal-subnav" class="seasonal-subnav" style="display: none;">
                    <span class="season-tab active" data-season="spring">봄</span>
                    <span class="season-tab" data-season="summer">여름</span>
                    <span class="season-tab" data-season="fall">가을</span>
                    <span class="season-tab" data-season="winter">겨울</span>
                </div>

                <div class="content">
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="레시피 검색">
                        <button id="searchBtn" class="search-btn" onclick="searchRecipes()">🔍</button>
                    </div>

                    <div class="popular-tags">
                        <span class="korean-font tag-item" onclick="filterByTag('한식')">#한식</span>
                        <span class="korean-font tag-item" onclick="filterByTag('양식')">#양식</span>
                        <span class="korean-font tag-item" onclick="filterByTag('중식')">#중식</span>
                        <span class="korean-font tag-item" onclick="filterByTag('일식')">#일식</span>
                        <span class="korean-font tag-item" onclick="filterByTag('간단요리')">#간단요리</span>
                        <span class="korean-font tag-item" onclick="filterByTag('전체')" style="font-weight: bold;">#전체보기</span>
                    </div>

                    <div id="recipe-grid">
                        <!-- 동적으로 추가될 레시피 카드 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <div class="container footer-container">
            <div class="row">
                <div class="col-lg-8 col-md-6 col-sm-6 col-xs-6">
                    <img src="static/images/smartbusan_logo.png" alt="digital smart busan logo" class="footer-logo">
                    <a class="footer-a" href="https://github.com/ggabaegii/RecipeRecommendation" target="_blank">&nbsp;&nbsp;Github</a>
                    <p class="fairy"> Fairies 김소희 권주회 임수현 조승일 황예민 </p>
                </div>
                <div class="col-lg-4 col-md-6 col-sm-6 col-xs-6 d-flex flex-column justify-content-center">
                    <p class="fairy"> 요리의 정원 </p>
                    <p class="fairy"> 2024 By fairies </p>
                </div>
            </div>
        </div>
    </footer>

    <script src="static/js/toggleMenu.js"></script>
    <script src="static/js/menu-auth.js"></script>
    <script src="static/js/fonts.js"></script>
    <script>
        // 이미지 경로: static/images/recipes/[음식명].jpg (직접 추가 필요, 없으면 mascot.jpg 사용)
        const recipeData = {
            // 화제의 레시피 (2~3개)
            trending: [
                { name: "김치찌개", image: "static/images/recipes/김치찌개.jpg", category: "한식", description: "얼큰하고 시원한 김치찌개" },
                { name: "떡볶이", image: "static/images/recipes/떡볶이.jpg", category: "한식", description: "매콤달콤 떡볶이" },
                { name: "파스타", image: "static/images/recipes/파스타.jpg", category: "양식", description: "크리미한 파스타" }
            ],
            // 제철 레시피 - 봄
            spring: [
                { name: "나물비빔밥", image: "static/images/recipes/나물비빔밥.jpg", category: "한식", description: "봄나물이 가득한 영양 비빔밥" },
                { name: "미역국", image: "static/images/recipes/미역국.jpg", category: "한식", description: "봄 미역으로 끓인 시원한 국" },
                { name: "쑥국", image: "static/images/recipes/쑥국.jpg", category: "한식", description: "봄철 쑥의 향이 살아있는 국" }
            ],
            // 제철 레시피 - 여름
            summer: [
                { name: "냉면", image: "static/images/recipes/냉면.jpg", category: "한식", description: "시원한 여름 보양식" },
                { name: "오이냉국", image: "static/images/recipes/오이냉국.jpg", category: "한식", description: "오이로 만든 시원한 냉국" },
                { name: "수박화채", image: "static/images/recipes/수박화채.jpg", category: "한식", description: "여름 대표 디저트" }
            ],
            // 제철 레시피 - 가을
            fall: [
                { name: "감자전", image: "static/images/recipes/감자전.jpg", category: "한식", description: "가을 감자의 고소한 맛" },
                { name: "굴국밥", image: "static/images/recipes/굴국밥.jpg", category: "한식", description: "가을 굴이 가득한 국밥" },
                { name: "배추김치", image: "static/images/recipes/배추김치.jpg", category: "한식", description: "가을 배추로 담근 김치" }
            ],
            // 제철 레시피 - 겨울
            winter: [
                { name: "김치찌개", image: "static/images/recipes/김치찌개.jpg", category: "한식", description: "얼큰하고 시원한 김치찌개" },
                { name: "부대찌개", image: "static/images/recipes/부대찌개.jpg", category: "한식", description: "든든한 겨울 찌개" },
                { name: "닭한마리", image: "static/images/recipes/닭한마리.jpg", category: "한식", description: "따뜻한 겨울 보양식" }
            ],
            // 특색 레시피 (2~3개)
            specialty: [
                { name: "밀면", image: "static/images/recipes/밀면.jpg", category: "한식", description: "부산 대표 특색 음식" },
                { name: "전주비빔밥", image: "static/images/recipes/전주비빔밥.jpg", category: "한식", description: "전주 대표 음식" },
                { name: "순대국밥", image: "static/images/recipes/순대국밥.jpg", category: "한식", description: "한국 대표 국밥" }
            ]
        };

        // 모든 레시피 (전체 목록)
        const allRecipes = [
            ...recipeData.trending,
            ...recipeData.spring,
            ...recipeData.summer,
            ...recipeData.fall,
            ...recipeData.winter,
            ...recipeData.specialty
        ].filter((r, i, arr) => arr.findIndex(x => x.name === r.name) === i); // 중복 제거

        let filteredRecipes = [...allRecipes];
        let currentTab = 'all';
        let currentSeason = 'spring';

        function displayRecipes(recipesToShow = filteredRecipes) {
            const recipeGrid = document.querySelector('#recipe-grid');
            recipeGrid.innerHTML = "";

            if (recipesToShow.length === 0) {
                recipeGrid.innerHTML = '<p style="grid-column: 1 / -1; padding: 40px; color: #666;">검색 결과가 없습니다.</p>';
                return;
            }

            recipesToShow.forEach(recipe => {
                const recipeCard = document.createElement('div');
                recipeCard.classList.add('card');
                recipeCard.style.cssText = 'cursor: pointer; transition: transform 0.3s, box-shadow 0.3s;';
                recipeCard.onmouseenter = () => {
                    recipeCard.style.transform = 'translateY(-5px)';
                    recipeCard.style.boxShadow = '0 8px 16px rgba(0,0,0,0.15)';
                };
                recipeCard.onmouseleave = () => {
                    recipeCard.style.transform = 'translateY(0)';
                    recipeCard.style.boxShadow = '0 4px 8px rgba(0, 0, 0, 0.1)';
                };
                recipeCard.onclick = () => {
                    window.location.href = 'recipe_detail.html';
                };

                const img = document.createElement('img');
                img.src = recipe.image || "static/images/mascot.jpg";
                img.alt = `${recipe.name} 사진`;
                img.onerror = () => { img.src = "static/images/mascot.jpg"; };

                const name = document.createElement('h3');
                name.textContent = recipe.name;
                name.classList.add('korean-font');
                name.style.cssText = 'margin: 15px 0 5px 0; color: #042C57; font-size: 1.2rem;';

                const description = document.createElement('p');
                description.textContent = recipe.description || '';
                description.style.cssText = 'margin: 5px 0 10px 0; color: #666; font-size: 0.9rem;';

                const category = document.createElement('span');
                category.textContent = `#${recipe.category}`;
                category.style.cssText = 'display: inline-block; padding: 5px 10px; background: #f0f0f0; border-radius: 15px; font-size: 0.85rem; color: #042C57; margin-bottom: 10px;';

                recipeCard.appendChild(img);
                recipeCard.appendChild(name);
                recipeCard.appendChild(description);
                recipeCard.appendChild(category);
                recipeGrid.appendChild(recipeCard);
            });
        }

        function searchRecipes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const baseRecipes = getRecipesForCurrentView();
            if (!searchTerm) {
                filteredRecipes = [...baseRecipes];
            } else {
                filteredRecipes = baseRecipes.filter(recipe => 
                    recipe.name.toLowerCase().includes(searchTerm) ||
                    (recipe.description && recipe.description.toLowerCase().includes(searchTerm)) ||
                    (recipe.category && recipe.category.toLowerCase().includes(searchTerm))
                );
            }
            displayRecipes();
        }

        function filterByTag(tag) {
            if (tag === '전체') {
                filteredRecipes = getRecipesForCurrentView();
            } else {
                filteredRecipes = getRecipesForCurrentView().filter(recipe => recipe.category === tag);
            }
            document.getElementById('searchInput').value = '';
            displayRecipes();
        }

        function getRecipesForCurrentView() {
            if (currentTab === 'all') return [...allRecipes];
            if (currentTab === 'trending') return [...recipeData.trending];
            if (currentTab === 'seasonal') return [...recipeData[currentSeason]];
            if (currentTab === 'specialty') return [...recipeData.specialty];
            return [...allRecipes];
        }

        function showTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.nav-tab[data-tab="${tab}"]`)?.classList.add('active');

            const subnav = document.getElementById('seasonal-subnav');

            if (tab === 'seasonal') {
                subnav.style.display = 'flex';
                filteredRecipes = [...recipeData[currentSeason]];
            } else {
                subnav.style.display = 'none';
                filteredRecipes = tab === 'all' ? [...allRecipes] : [...recipeData[tab]];
            }
            displayRecipes();
        }

        function showSeason(season) {
            currentSeason = season;
            document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.season-tab[data-season="${season}"]`)?.classList.add('active');
            filteredRecipes = [...recipeData[season]];
            displayRecipes();
        }

        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => showTab(tab.dataset.tab));
        });
        document.querySelectorAll('.season-tab').forEach(tab => {
            tab.addEventListener('click', () => showSeason(tab.dataset.season));
        });

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchRecipes();
        });

        document.addEventListener('DOMContentLoaded', () => {
            showTab('all');
        });
    </script>
</body>
</html>
