<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레시피 목록 - 요리의 정원</title>
    <link rel="stylesheet" href="static/css/layout.css">
    <link rel="stylesheet" href="static/css/recipe_main.css">
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin="anonymous" />
    <link rel="preload" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="background-container">
        <div class="menu-icon" id="menuIcon" onclick="toggleMenu()">☰</div>
        <header>
            <div class="point-font main-title" onclick="window.location.href='index.html'">요리의 정원</div>
        </header>

        <div id="menu" class="menu">
            <a href="javascript:void(0)" class="closebtn" onclick="toggleMenu()">×</a>   
            <div class="profile">
                <span>Guest</span>
            </div>
            <div class="menu-basictag">
                <a href="index.html">Home</a>
                <a href="recipe_main.html">레시피</a>
                <a href="cooktip.html">요리 꿀팁</a>
                <a href="login.html">로그인</a>
                <a href="signup.html">회원가입</a>
                <a href="recipe_register.html">레시피 작성</a>
                <a href="mypagemain.html">마이페이지</a>
            </div>
            <div class="menu-buttons">
                <button onclick="window.location.href='login.html'">로그인</button>
                <button onclick="window.location.href='signup.html'">회원가입</button>
            </div>
        </div>

        <main class="wrapper">
            <div class="content">
                <header>  
                    <div class="navigation">
                        <a href="recipe_main.html" class="active korean-font">모든 레시피</a>
                        <a href="#" class="korean-font">화제의 레시피</a>
                        <a href="#" class="korean-font">제철 레시피</a>
                        <a href="#" class="korean-font">특색 레시피</a>
                        <a href="recipe_register.html" class="korean-font">레시피 등록</a>
                    </div>
                </header>

                <div class="content">
                    <h2 class="korean-font">레시피 목록</h2>

                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="레시피 검색">
                        <button id="searchBtn" class="search-btn" onclick="searchRecipes()">🔍</button>
                    </div>

                    <div class="popular-tags">
                        <span class="korean-font tag-item" onclick="filterByTag('한식')">#한식</span>
                        <span class="korean-font tag-item" onclick="filterByTag('양식')">#양식</span>
                        <span class="korean-font tag-item" onclick="filterByTag('중식')">#중식</span>
                        <span class="korean-font tag-item" onclick="filterByTag('일식')">#일식</span>
                        <span class="korean-font tag-item" onclick="filterByTag('간단요리')">#간단요리</span>
                        <span class="korean-font tag-item" onclick="filterByTag('전체')" style="font-weight: bold;">#전체보기</span>
                    </div>

                    <div id="recipe-grid">
                        <!-- 동적으로 추가될 레시피 카드 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <div class="container footer-container">
            <div class="row">
                <div class="col-lg-8 col-md-6 col-sm-6 col-xs-6">
                    <img src="static/images/smartbusan_logo.png" alt="digital smart busan logo" class="footer-logo">
                    <a class="footer-a" href="https://github.com/ggabaegii/RecipeRecommendation" target="_blank">&nbsp;&nbsp;Github</a>
                    <p class="fairy"> Fairies 김소희 권주회 임수현 조승일 황예민 </p>
                </div>
                <div class="col-lg-4 col-md-6 col-sm-6 col-xs-6 d-flex flex-column justify-content-center">
                    <p class="fairy"> 요리의 정원 </p>
                    <p class="fairy"> 2024 By fairies </p>
                </div>
            </div>
        </div>
    </footer>

    <script src="static/js/toggleMenu.js"></script>
    <script src="static/js/fonts.js"></script>
    <script>
        const allRecipes = [
            { name: "김치찌개", searchCount: 120, image: "static/images/mascot.jpg", category: "한식", description: "얼큰하고 시원한 김치찌개" },
            { name: "된장찌개", searchCount: 80, image: "static/images/mascot.jpg", category: "한식", description: "구수한 된장찌개" },
            { name: "비빔밥", searchCount: 120, image: "static/images/mascot.jpg", category: "한식", description: "영양만점 비빔밥" },
            { name: "불고기", searchCount: 90, image: "static/images/mascot.jpg", category: "한식", description: "달콤한 불고기" },
            { name: "떡볶이", searchCount: 150, image: "static/images/mascot.jpg", category: "한식", description: "매콤달콤 떡볶이" },
            { name: "라면", searchCount: 200, image: "static/images/mascot.jpg", category: "간단요리", description: "간단한 라면 요리" },
            { name: "파스타", searchCount: 95, image: "static/images/mascot.jpg", category: "양식", description: "크리미한 파스타" },
            { name: "피자", searchCount: 110, image: "static/images/mascot.jpg", category: "양식", description: "치즈가 가득한 피자" },
            { name: "짜장면", searchCount: 130, image: "static/images/mascot.jpg", category: "중식", description: "달콤한 짜장면" },
            { name: "초밥", searchCount: 100, image: "static/images/mascot.jpg", category: "일식", description: "신선한 초밥" },
            { name: "라멘", searchCount: 85, image: "static/images/mascot.jpg", category: "일식", description: "진한 국물의 라멘" },
            { name: "볶음밥", searchCount: 75, image: "static/images/mascot.jpg", category: "간단요리", description: "간단한 볶음밥" }
        ];

        let filteredRecipes = [...allRecipes];

        function displayRecipes(recipesToShow = filteredRecipes) {
            const recipeGrid = document.querySelector('#recipe-grid');
            recipeGrid.innerHTML = "";

            if (recipesToShow.length === 0) {
                recipeGrid.innerHTML = '<p style="grid-column: 1 / -1; padding: 40px; color: #666;">검색 결과가 없습니다.</p>';
                return;
            }

            recipesToShow.forEach(recipe => {
                const recipeCard = document.createElement('div');
                recipeCard.classList.add('card');
                recipeCard.style.cssText = 'cursor: pointer; transition: transform 0.3s, box-shadow 0.3s;';
                recipeCard.onmouseenter = () => {
                    recipeCard.style.transform = 'translateY(-5px)';
                    recipeCard.style.boxShadow = '0 8px 16px rgba(0,0,0,0.15)';
                };
                recipeCard.onmouseleave = () => {
                    recipeCard.style.transform = 'translateY(0)';
                    recipeCard.style.boxShadow = '0 4px 8px rgba(0, 0, 0, 0.1)';
                };
                recipeCard.onclick = () => {
                    window.location.href = 'recipe_detail.html';
                };

                const img = document.createElement('img');
                img.src = recipe.image || "static/images/mascot.jpg";
                img.alt = `${recipe.name} 사진`;

                const name = document.createElement('h3');
                name.textContent = recipe.name;
                name.classList.add('korean-font');
                name.style.cssText = 'margin: 15px 0 5px 0; color: #042C57; font-size: 1.2rem;';

                const description = document.createElement('p');
                description.textContent = recipe.description || '';
                description.style.cssText = 'margin: 5px 0 10px 0; color: #666; font-size: 0.9rem;';

                const category = document.createElement('span');
                category.textContent = `#${recipe.category}`;
                category.style.cssText = 'display: inline-block; padding: 5px 10px; background: #f0f0f0; border-radius: 15px; font-size: 0.85rem; color: #042C57; margin-bottom: 10px;';

                recipeCard.appendChild(img);
                recipeCard.appendChild(name);
                recipeCard.appendChild(description);
                recipeCard.appendChild(category);
                recipeGrid.appendChild(recipeCard);
            });
        }

        function searchRecipes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!searchTerm) {
                filteredRecipes = [...allRecipes];
            } else {
                filteredRecipes = allRecipes.filter(recipe => 
                    recipe.name.toLowerCase().includes(searchTerm) ||
                    recipe.description.toLowerCase().includes(searchTerm) ||
                    recipe.category.toLowerCase().includes(searchTerm)
                );
            }
            displayRecipes();
        }

        function filterByTag(tag) {
            if (tag === '전체') {
                filteredRecipes = [...allRecipes];
            } else {
                filteredRecipes = allRecipes.filter(recipe => recipe.category === tag);
            }
            document.getElementById('searchInput').value = '';
            displayRecipes();
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchRecipes();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            displayRecipes();
        });
    </script>
</body>
</html>
