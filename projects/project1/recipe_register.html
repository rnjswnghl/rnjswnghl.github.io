</head>

            <div class="point-font main-title" onclick="window.location.href='index.html'">요리의 정원</div>
        </header>

        <div id="menu" class="menu">
            <a href="javascript:void(0)" class="closebtn" onclick="toggleMenu()">×</a>   
            <div class="profile">
                <span>Guest</span>
            </div>
            <div id="menu-logged-out" class="menu-basictag">
                <a href="index.html">홈</a>
                <a href="recipe_main.html">레시피</a>
                <a href="cooktip.html">요리 꿀팁</a>
                <a href="login.html">로그인</a>
                <a href="signup.html">회원가입</a>
            </div>
            <div id="menu-logged-in" class="menu-basictag" style="display:none">
                <a href="index.html">홈</a>
                <a href="recipe_main.html">레시피</a>
                <a href="cooktip.html">요리 꿀팁</a>
                <a href="recipe_register.html">레시피 작성</a>
                <a href="mypagemain.html">마이페이지</a>
                <a href="javascript:void(0)" onclick="logout()">로그아웃</a>
            </div>
        </div>

        <main class="wrapper">
            <div class="content">
                <header>
                    <div class="navigation">
                        <a href="recipe_main.html" class="korean-font">모든 레시피</a>
                        <a href="#" class="korean-font">화제의 레시피</a>
                        <a href="#" class="korean-font">제철 레시피</a>
                        <a href="#" class="korean-font">특색 레시피</a>
                        <a href="recipe_register.html" class="active">레시피 등록</a>
                    </div>
                </header>

                <div class="container">
                    <h1 class="korean-font">레시피 등록</h1>
                    <div style="display:none;">
                        <p style="margin: 0; color: #856404; font-size: 0.9rem;">
                            ⚠️ 데모 버전: 레시피 등록 기능은 작동하지 않습니다.
                        </p>
                    </div>
                    
                    <form onsubmit="event.preventDefault(); alert('데모 버전에서는 레시피를 등록할 수 없습니다.');">
                        <label for="title">레시피 제목</label>
                        <input type="text" id="title" name="title" placeholder="Ex) 소고기 미역국">

                        <div class="info-group">
                            <label for="cook_time">소요 시간</label>
                            <select name="cook_time" id="cook_time">
                                <option value="30분 이내">30분 이내</option>
                                <option value="1시간 이내">1시간 이내</option>
                                <option value="1시간 이상">1시간 이상</option>
                            </select>
                            <label for="difficulty">난이도</label>
                            <select name="difficulty" id="difficulty">
                                <option value="쉬움">쉬움</option>
                                <option value="보통">보통</option>
                                <option value="어려움">어려움</option>
                            </select>
                        </div>

                        <div class="ingredient-group">
                            <label for="ingredient">요리 재료</label>
                            <input type="text" name="ingredient" id="ingredient" placeholder="재료명">
                            <input type="text" name="ingredient_amount" id="ingredient_amount" placeholder="재료양">
                            <button type="button" onclick="addIngredientField()">재료 추가</button>
                        </div>

                        <div class="sauce-group">
                            <label for="sauce_name">소스</label>
                            <input type="text" name="sauce_name" id="sauce_name" placeholder="소스명">
                            <input type="text" name="sauce_amount" id="sauce_amount" placeholder="소스양">
                            <button type="button" onclick="addSauceField()">소스 추가</button>
                        </div>

                        <div class="substitute-group">
                            <label for="substitute">대체 재료</label>
                            <input type="text" name="substitute" id="substitute" placeholder="원재료">
                            <input type="text" name="substitute_alt" id="substitute_alt" placeholder="대체 재료">
                            <button type="button" onclick="addSubstituteField()">대체 재료 추가</button>
                        </div>

                        <div class="photo-group">
                            <label for="photo">요리 사진</label>
                            <input type="file" name="photo" id="photo" accept="image/*">
                            <p>완성된 요리의 대표 사진을 삽입해주세요.</p>
                        </div>

                        <label for="steps">조리 순서</label>
                        <textarea id="steps" name="steps" placeholder="1. ...&#10;2. ..." rows="10"></textarea>

                        <label for="tags">해시태그</label>
                        <input type="text" id="tags" name="tags" placeholder="#고기 #미역국 #새우젓" maxlength="30">

                        <button type="submit">작성 완료</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <div class="container footer-container">
            <div class="row">
                <div class="col-lg-8 col-md-6 col-sm-6 col-xs-6">
                    <img src="static/images/smartbusan_logo.png" alt="digital smart busan logo" class="footer-logo">
                    <a class="footer-a" href="https://github.com/ggabaegii/RecipeRecommendation" target="_blank">&nbsp;&nbsp;Github</a>
                    <p class="fairy"> Fairies 김소희 권주회 임수현 조승일 황예민 </p>
                </div>
                <div class="col-lg-4 col-md-6 col-sm-6 col-xs-6 d-flex flex-column justify-content-center">
                    <p class="fairy"> 요리의 정원 </p>
                    <p class="fairy"> 2024 By fairies </p>
                </div>
            </div>
        </div>
    </footer>

    <script src="static/js/toggleMenu.js"></script>
    <script src="static/js/menu-auth.js"></script>
    <script src="static/js/fonts.js"></script>
    <script src="static/js/recipe_register.js"></script>
</body>
</html>
