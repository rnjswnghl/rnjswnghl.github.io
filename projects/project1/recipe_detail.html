<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레시피 상세 - 요리의 정원</title>
    <base href="/projects/project1/">
    <link rel="stylesheet" href="static/css/layout.css">
    <link rel="stylesheet" href="static/css/recipe_detail.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css" />
</head>
<body>
    <div class="background-container">
        <div class="menu-icon" id="menuIcon" onclick="toggleMenu()">☰</div>
        <header>
            <div class="point-font main-title" onclick="window.location.href='index.html'">요리의 정원</div>
        </header>

        <div id="menu" class="menu">
            <a href="javascript:void(0)" class="closebtn" onclick="toggleMenu()">×</a>   
            <div class="profile">
                <span>Guest</span>
            </div>
            <div id="menu-logged-out" class="menu-basictag">
                <a href="index.html">홈</a>
                <a href="recipe_main.html">레시피</a>
                <a href="cooktip.html">요리 꿀팁</a>
                <a href="login.html">로그인</a>
                <a href="signup.html">회원가입</a>
            </div>
            <div id="menu-logged-in" class="menu-basictag" style="display:none">
                <a href="index.html">홈</a>
                <a href="recipe_main.html">레시피</a>
                <a href="cooktip.html">요리 꿀팁</a>
                <a href="recipe_register.html">레시피 작성</a>
                <a href="mypagemain.html">마이페이지</a>
                <a href="javascript:void(0)" onclick="logout()">로그아웃</a>
            </div>
        </div>

        <main class="wrapper">
            <div class="content">
                <div class="recipe-content col-lg-6 col-md-6 col-sm-8 col-xs-8">
                    <button onclick="window.location.href='recipe_main.html'" style="margin-bottom: 20px; padding: 10px 20px; background: #042C57; color: white; border: none; border-radius: 5px; cursor: pointer;">← 레시피 목록으로</button>
                    
                    <h1 class="page-title">레시피 상세 페이지</h1>

                    <div class="recipe-image">
                        <img id="recipe-main-image" src="static/images/recipes/김치찌개.jpg" alt="" onerror="this.src='static/images/mascot.jpg'">
                    </div>

                    <section class="recipe-info">
                        <h2 class="dish-name" id="dish-name">요리 이름: 김치찌개</h2>
                        <hr>
                        <p><strong>요리 카테고리:</strong> <span id="recipe-category">한식</span></p>
                        <p><strong>소요 시간:</strong> <span id="recipe-time">30분</span></p>
                        <p><strong>난이도:</strong> <span id="recipe-difficulty">쉬움</span></p>
                    </section>

                    <section class="ingredients">
                        <h3>재료</h3>
                        <ul id="ingredients-list"></ul>
                    </section>

                    <section class="cooking-steps">
                        <h3>조리 방법</h3>
                        <div id="cooking-steps-content"></div>
                    </section>

                    <section class="user-interaction">
                        <div class="icons">
                            <span class="icon scrap" id="scrapIcon" title="스크랩" data-off="📋" data-on="💾">📋</span>
                            <span class="icon like" id="likeIcon" title="좋아요" data-off="🤍" data-on="❤️">🤍</span>
                            <span class="icon share" id="shareIcon" title="공유">🔗</span>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <div class="container footer-container">
            <div class="row">
                <div class="col-lg-8 col-md-6 col-sm-6 col-xs-6">
                    <img src="static/images/smartbusan_logo.png" alt="digital smart busan logo" class="footer-logo">
                    <a class="footer-a" href="https://github.com/ggabaegii/RecipeRecommendation" target="_blank">&nbsp;&nbsp;Github</a>
                    <p class="fairy"> Fairies 김소희 권주회 임수현 조승일 황예민 </p>
                </div>
                <div class="col-lg-4 col-md-6 col-sm-6 col-xs-6 d-flex flex-column justify-content-center">
                    <p class="fairy"> 요리의 정원 </p>
                    <p class="fairy"> 2024 By fairies </p>
                </div>
            </div>
        </div>
    </footer>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="static/js/toggleMenu.js"></script>
    <script src="static/js/menu-auth.js"></script>
    <script src="static/js/fonts.js"></script>
    <script src="static/js/recipe_detail.js"></script>
</body>
</html>
